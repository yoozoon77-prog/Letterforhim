<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>우리 집 이야기</title>

<!-- 픽셀 감성 폰트 -->

<link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/DungGeunMo.css" rel="stylesheet">

<style>

body{

  margin:0;

  background:#fff3f6;

  font-family:'DungGeunMo', monospace;

  display:flex;

  flex-direction:column;

  align-items:center;

}

/* 캔버스 */

canvas{

  width:100%;

  max-width:500px;

  height:auto;

  background:#fdf6f0;

  image-rendering: pixelated;

  border:3px solid #e8cfcf;

}

/* 텍스트 박스 */

#textBox{

  width:100%;

  max-width:500px;

  min-height:120px;

  background:white;

  padding:15px;

  border-top:3px solid #e8cfcf;

  box-sizing:border-box;

  line-height:1.6;

}

</style>

</head>

<body>

<canvas id="game"></canvas>

<div id="textBox">화면을 터치해서 움직여봐 💗</div>

<script>

const canvas = document.getElementById('game');

const ctx = canvas.getContext('2d');

canvas.width = 500;

canvas.height = 300;

/* =========================

   캐릭터 설정

   ========================= */

let player = {

  x: 250,

  y: 150,

  size: 20,

  targetX: 250,

  targetY: 150

};

/* =========================

   오브젝트 (가구)

   x,y 값 바꾸면 위치 변경 가능

   ========================= */

const objects = [

  {name:'tv', x:50, y:50, w:40, h:30},

  {name:'bed', x:380, y:60, w:50, h:30},

  {name:'table', x:200, y:200, w:50, h:30},

  {name:'bath', x:400, y:200, w:40, h:30}

];

/* =========================

   추억 문구 (여기 수정하면 됨)

   ========================= */

const messages = {

  tv: "우리 여기서 같이 공포영화 보다가 무서워서 불 다 켜고 잤었지?",

  bed: "이 침대에서 진짜 많이 웃고 얘기했던 거 생각나",

  table: "같이 밥 먹으면서 별 얘기 다 했던 거 좋았어",

  bath: "별거 아닌 순간인데도 같이 있어서 좋았던 기억이야"

};

/* =========================

   텍스트 타이핑 효과

   ========================= */

function typeText(text){

  let i = 0;

  const box = document.getElementById('textBox');

  box.innerHTML = "";

  const interval = setInterval(()=>{

    box.innerHTML += text[i];

    i++;

    if(i >= text.length) clearInterval(interval);

  }, 30);

}

/* =========================

   클릭 시 이동

   ========================= */

canvas.addEventListener('click', (e)=>{

  const rect = canvas.getBoundingClientRect();

  player.targetX = (e.clientX - rect.left);

  player.targetY = (e.clientY - rect.top);

});

/* =========================

   이동 애니메이션

   ========================= */

function update(){

  player.x += (player.targetX - player.x) * 0.1;

  player.y += (player.targetY - player.y) * 0.1;

  checkCollision();

}

/* =========================

   충돌 체크 (가구 근처 가면 텍스트 출력)

   ========================= */

let lastObject = null;

function checkCollision(){

  objects.forEach(obj=>{

    const dx = player.x - obj.x;

    const dy = player.y - obj.y;

    const dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 40){

      if(lastObject !== obj.name){

        typeText(messages[obj.name]);

        lastObject = obj.name;

      }

    }

  });

}

/* =========================

   그리기

   ========================= */

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* 배경 (우리 집 바닥) */

  ctx.fillStyle = "#f8e8e8";

  ctx.fillRect(0,0,canvas.width,canvas.height);

  /* 가구 그리기 (나중에 이미지로 교체 가능) */

  objects.forEach(obj=>{

    ctx.fillStyle = "#d4a5a5";

    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);

    ctx.fillStyle = "#000";

    ctx.font = "10px DungGeunMo";

    ctx.fillText(obj.name, obj.x, obj.y - 5);

  });

  /* 캐릭터 (현재는 네모 → 이미지로 교체 가능) */

  ctx.fillStyle = "#ff8fab";

  ctx.fillRect(player.x - 10, player.y - 10, 20, 20);

}

/* =========================

   게임 루프

   ========================= */

function loop(){

  update();

  draw();

  requestAnimationFrame(loop);

}

loop();

</script>

</body>

</html>
